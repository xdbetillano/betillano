<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Single Page | Nexus</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        /* --- VARIABLES Y RESET --- */
        :root {
            --bg-color: #0b0f1a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
            --gradient: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden; /* Elimina el scroll */
            display: flex;
            flex-direction: column;
        }

        /* --- NAVEGACIÓN --- */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5%;
            z-index: 10;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .logo span {
            color: var(--accent);
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 2.5rem;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dim);
            font-size: 0.9rem;
            font-weight: 400;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        /* --- HERO SECTION --- */
        .hero {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 0 8%;
            position: relative;
        }

        .hero-content {
            max-width: 700px;
            z-index: 2;
        }

        h1 {
            font-size: clamp(3rem, 8vw, 5rem); /* Tamaño fluido */
            line-height: 1;
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        .gradient-text {
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-dim);
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 3rem;
            max-width: 500px;
        }

        /* --- BOTONES --- */
        .cta-group {
            display: flex;
            gap: 1.5rem;
        }

        .btn {
            padding: 1rem 2.5rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--gradient);
            color: #fff;
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(56, 189, 248, 0.3);
        }

        .btn-secondary {
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* --- DECORACIÓN DE FONDO --- */
        .glass-circle {
            position: absolute;
            top: 50%;
            right: -5%;
            transform: translateY(-50%);
            width: 500px;
            height: 500px;
            background: var(--gradient);
            filter: blur(120px);
            border-radius: 50%;
            opacity: 0.15;
            z-index: 1;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(-50%) translateX(0); }
            50% { transform: translateY(-60%) translateX(-20px); }
            100% { transform: translateY(-50%) translateX(0); }
        }

        /* Ajustes para móviles */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hero { text-align: center; justify-content: center; }
            .cta-group { justify-content: center; flex-direction: column; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">NEXUS<span>.</span></div>
        <ul class="nav-links">
            <li><a href="#">Concepto</a></li>
            <li><a href="#">Soluciones</a></li>
            <li><a href="#">Blog</a></li>
        </ul>
    </nav>

    <main class="hero">
        <div class="hero-content">
            <h1>Impacto visual <br><span class="gradient-text">sin límites.</span></h1>
            <p>Una interfaz limpia, moderna y diseñada para convertir visitantes en clientes en menos de un segundo.</p>
            <div class="cta-group">
                <a href="#" class="btn btn-primary">Comenzar ahora</a>
                <a href="#" class="btn btn-secondary">Ver demo</a>
            </div>
        </div>
        
        <div class="glass-circle"></div>
    </main>

</body>
</html>
